<div class="form-container">
  <header class="form-header">
    <div class="header-left">
      <button class="back-link" routerLink="/vacantes">← Volver al Listado</button>
      <h1>{{ isEditMode ? 'Editar Vacante' : 'Nueva Vacante' }}</h1>
    </div>
  </header>

  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <p>Cargando datos de la vacante...</p>
  </div>

  <div *ngIf="errorMsg" class="error-state">
    <p>{{ errorMsg }}</p>
    <button class="btn btn-secondary" routerLink="/vacantes">Volver</button>
  </div>

  <form *ngIf="!loading && !errorMsg" (ngSubmit)="onSubmit()" #vacanteForm="ngForm" class="profile-form">
    <section class="form-section">
      <h2 class="section-title">Información de la Oferta Laboral</h2>
      
      <div class="form-grid">
        <div class="form-group required full-width">
          <label for="perfil_id">Asociar a Perfil de Cargo</label>
          <select id="perfil_id" name="perfil_id" [(ngModel)]="perfil_id" required class="form-control">
            <option value="" disabled selected>Seleccione un perfil de cargo existente...</option>
            <option *ngFor="let perfil of perfiles" [value]="perfil.id">
              {{ perfil.cargo }} ({{ perfil.area }})
            </option>
          </select>
        </div>

        <div class="form-group required full-width">
          <label for="titulo">Título de la Vacante</label>
          <input 
            type="text" 
            id="titulo" 
            name="titulo" 
            [(ngModel)]="titulo" 
            required 
            placeholder="Ej. Desarrollador Angular Senior - Medellín" 
            class="form-control"
          />
        </div>

        <div class="form-group required full-width">
          <label for="descripcion">Descripción de la Vacante / Requisitos Adicionales</label>
          <textarea 
            id="descripcion" 
            name="descripcion" 
            [(ngModel)]="descripcion" 
            required 
            rows="8" 
            placeholder="Describe las funciones, requisitos, salario, jornada y beneficios del puesto de trabajo..." 
            class="form-control"
          ></textarea>
        </div>

        <div class="form-group full-width">
          <label for="estado">Estado de la Vacante</label>
          <select id="estado" name="estado" [(ngModel)]="estado" class="form-control">
            <option value="ACTIVA">🟢 ACTIVA (Pública para postulaciones)</option>
            <option value="INACTIVA">🔴 INACTIVA (Oculta para candidatos)</option>
          </select>
        </div>
      </div>
    </section>

    <footer class="form-footer-actions">
      <button type="button" class="btn btn-secondary" routerLink="/vacantes">Cancelar</button>
      <button type="submit" class="btn btn-primary" [disabled]="submitting || !vacanteForm.form.valid">
        {{ submitting ? 'Guardando...' : 'Guardar Vacante' }}
      </button>
    </footer>
  </form>
</div>
