<section class="form-section">
  <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
    <h2 class="section-title">Funciones y Responsabilidades</h2>
    <button type="button" class="btn btn-secondary btn-sm" (click)="addFunc()">+ Agregar Función</button>
  </div>

  <div class="list-entries mt-3">
    <div class="list-item-row" *ngFor="let fn of funciones; let i = index; trackBy: trackByIndex" style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center;">
      <span class="row-num" style="min-width: 20px; font-weight: bold; color: var(--brand-navy);">{{ i + 1 }}</span>
      <input type="text" name="funciones_{{i}}" [ngModel]="funciones[i]" (ngModelChange)="funciones[i] = $event; funcionesChange.emit(funciones)"
        placeholder="Describa una función del cargo..." class="list-input" style="flex: 1; border-radius: 4px; border: 1.5px solid #ddd; padding: 0.5rem;" />
      <button type="button" class="remove-row-btn" (click)="removeFunc(i)" *ngIf="funciones.length > 1">✕</button>
    </div>
  </div>
</section>
